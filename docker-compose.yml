version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bocra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bocra_user
      POSTGRES_PASSWORD: bocra_password
      POSTGRES_DB: bocra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bocra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: